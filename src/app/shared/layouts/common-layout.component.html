<div class="bg-bgLightDarker dark:bg-bgDarkDarker min-h-screen overflow-x-clip">
  <div class="background min-h-screen overflow-x-clip">
    <header
      class="bg-bgLight/40 dark:bg-bgDark/40 backdrop-blur-xs sticky top-0 z-50 flex h-16 items-center justify-between self-center px-4 backdrop-contrast-100 backdrop-saturate-100 backdrop-filter"
    >
      <a
        routerLink=""
        class="text-primaryDarker flex items-center justify-center self-center text-xl font-bold"
        ><img
          class="h-8 w-8"
          src="assets/img/gameon-logo.webp"
          alt="GameOn!'s logo"
        />
        <span class="dark:text-primaryDark ml-2">GameOn!</span></a
      >

      <div class="flex items-center justify-center space-x-4">
        <button type="button" class="cursor-pointer" (click)="toggleDarkMode()">
          @if (darkMode()) {
            <fa-icon
              [icon]="lightIcon"
              class="text-customYellow text-lg"
            ></fa-icon>
          }
          @if (!darkMode()) {
            <fa-icon
              [icon]="darkIcon"
              class="text-frenchBlue text-lg"
            ></fa-icon>
          }
        </button>
      </div>
    </header>

    <div class="bubble-layer" aria-hidden="true">
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
    </div>

    <nav
      class="border-l-frenchBlue border-r-frenchRed bg-bgLight/50 dark:border-y-bgLight dark:bg-bgDark/50 fixed bottom-4 left-1/2 z-50 h-16 w-11/12 max-w-lg -translate-x-1/2 rounded-full border border-l-2 border-r-2 border-b-gray-300 border-t-gray-300 backdrop-blur-sm backdrop-contrast-100 backdrop-saturate-100 backdrop-filter"
    >
      <div
        class="flex h-full w-full grow basis-1 items-center justify-around align-middle"
      >
        <div
          routerLink=""
          class="group inline-flex cursor-pointer flex-col items-center justify-center rounded-s-full"
        >
          <fa-icon
            [icon]="homeIcon"
            class="text-primary dark:text-primaryDark text-lg"
          ></fa-icon>
        </div>

        <div
          routerLink="/fifa"
          class="group inline-flex cursor-pointer flex-col items-center justify-center rounded-s-full"
        >
          <fa-icon
            [icon]="ballIcon"
            class="text-primary dark:text-primaryDark text-lg"
          ></fa-icon>
        </div>

        <div
          class="group inline-flex cursor-pointer flex-col items-center justify-center rounded-s-full"
        >
          <img
            src="assets/img/svg/lol.svg"
            routerLink="/lol"
            class="w-10 min-w-10"
          />
        </div>

        <div
          class="group inline-flex cursor-pointer flex-col items-center justify-center rounded-s-full"
        >
          <button
            routerLink="/fifa/tournaments"
            type="button"
            class="cursor-pointer"
          >
            <fa-icon
              [icon]="trophyIcon"
              class="text-primary dark:text-primaryDark text-lg"
            ></fa-icon>
          </button>
        </div>

        <div
          class="group inline-flex cursor-pointer flex-col items-center justify-center rounded-s-full"
        >
          @if (isLoggedIn == true) {
            <button
              routerLink="/player/me"
              type="button"
              class="group inline-flex cursor-pointer flex-col items-center justify-center rounded-e-full"
            >
              <fa-icon
                [icon]="userIcon"
                class="text-primary dark:text-primaryDark text-lg"
              ></fa-icon>
            </button>
          }

          @if (isLoggedIn == false) {
            <button
              (click)="login()"
              type="button"
              class="group inline-flex cursor-pointer flex-col items-center justify-center rounded-e-full"
            >
              <fa-icon
                [icon]="userIcon"
                class="text-primary dark:text-primaryDark text-lg"
              ></fa-icon>
            </button>
          }
        </div>
      </div>
    </nav>

    <div>
      <div
        class="3xl:px-96 px-0 pb-28 md:px-16 lg:h-[calc(100vh-4rem)] lg:overflow-y-auto lg:px-32 lg:pb-28 xl:px-64 2xl:px-80"
      >
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
